version: '3.8'
services:
  pdf-service:
    build: .
    ports:
      - "3001:3001"
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid,nodev
      - /home/pptruser/.cache:size=200m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M
        reservations:
          memory: 512M
    pids_limit: 150
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ALLOWED_ORIGINS=https://formattedai.pl,https://www.formattedai.pl
    restart: unless-stopped
