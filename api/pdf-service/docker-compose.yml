services:
  pdf-service:
    build: .
    ports:
      - "3001:3001"
    read_only: true
    tmpfs:
      - /tmp:size=100m,noexec,nosuid,nodev
      - /home/pptruser/.cache:size=200m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 150
    mem_limit: 1536m
    cpus: 1.5
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ALLOWED_ORIGINS=http://127.0.0.1:5500,http://localhost:5500,https://formattedai.pl,https://www.formattedai.pl
    restart: unless-stopped
